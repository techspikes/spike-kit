data-sketch: 1.0.0-draft.0

info:
  name: online-shop

stores:
  customer:
    name: shop_customers
    reason: Persist customer information.
    trace:
      operations:
        - createCustomer
        - getCustomer

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: customer_public_id
        type:
          name: char
          length: 26
        nullable: false
        format: ulid

      name:
        name: display_name
        type:
          name: varchar
          length: 120
        nullable: true
        default: null

    keys:
      primary:
        name: pk_shop_customers
        fields:
          - id

      unique:
        - name: ux_shop_customers_public_id
          fields:
            - publicId

  order:
    name: orders
    reason: Order operations need to create, read, list, cancel, and fulfill orders.
    trace:
      operations:
        - createOrder
        - getOrderDetail
        - cancelOrder
        - listOrders
        - fulfillOrder

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: public_id
        type:
          name: char
          length: 26
        nullable: false
        format: ulid

      customerId:
        name: customer_id
        type:
          name: integer
        nullable: false

      status:
        name: status
        type:
          name: varchar
          length: 30
        nullable: false
        default: pending

      fulfillmentStatus:
        name: fulfillment_status
        type:
          name: varchar
          length: 30
        nullable: false
        default: unfulfilled

      fulfilledAt:
        name: fulfilled_at
        type:
          name: timestamp
        nullable: true

      createdAt:
        name: created_at
        type:
          name: timestamp
        nullable: false

      updatedAt:
        name: updated_at
        type:
          name: timestamp
        nullable: false

    keys:
      primary:
        name: pk_orders
        fields:
          - id

      unique:
        - name: ux_orders_public_id
          fields:
            - publicId

      foreign:
        - name: fk_orders_customer
          fields:
            - customerId
          references:
            store: customer
            fields:
              - id
          onDelete: restrict
          onUpdate: restrict

    indexes:
      - name: ix_orders_status
        fields:
          - status
        reason: Used to search orders by status.

      - name: ix_orders_customer_created_at
        fields:
          - customerId
          - createdAt
        reason: Used to list orders for a customer.

      - name: ix_orders_fulfillment_status
        fields:
          - fulfillmentStatus
        reason: Used to find orders waiting for fulfillment.
