data-sketch: 1.0.0-draft.0
info:
  name: online-shop
stores:
  order:
    name: orders
    reason: Order operations need to create, read, list, and cancel orders.
    trace:
      operations:
        - createOrder
        - getOrderDetail
        - cancelOrder
        - listOrders
    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false
      status:
        name: status
        type:
          name: varchar
          length: 20
        nullable: false
        enum:
          - created
          - cancelled
      createdAt:
        name: created_at
        type:
          name: timestamp
        nullable: false
    indexes:
      - name: ix_orders_created_at
        fields:
          - field: createdAt
            order: desc
        reason: Used to list recent orders first.
